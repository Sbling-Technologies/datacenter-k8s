apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: homepage
  app.kubernetes.io/instance: homepage-prod

resources:
  - deployment.yaml
  - ingress.yaml
  - namespace.yaml
  - rbac.yaml
  - secrets.yaml
  - service.yaml

configMapGenerator:
  - name: homepage-config
    files:
      - config/bookmarks.yaml
      - config/kubernetes.yaml
      - config/services.yaml
      - config/settings.yaml
      - config/widgets.yaml
    literals:
      - custom.css=
      - custom.js=
      - docker.yaml=
      - proxmox.yaml=
  - name: homepage-icons
    files:
      - icons/linear.ico
