apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

secretGenerator:
  - name: db-credentials
    literals:
      - username=pelican
      - password=preview-db-123

patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
    patch: |-
      - op: replace
        path: /spec/instances
        value: 1
