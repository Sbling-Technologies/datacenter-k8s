apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pelican-panel-db
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.4

  monitoring:
    enablePodMonitor: true

  bootstrap:
    initdb:
      database: panel
      owner: pelican
      secret:
        name: db-credentials

  storage:
    storageClass: longhorn-single-replica-retain
    size: 5Gi
---
