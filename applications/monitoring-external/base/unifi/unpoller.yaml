apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: unpoller
  name: unpoller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unpoller
  template:
    metadata:
      labels:
        app: unpoller
    spec:
      containers:
        - image: ghcr.io/unpoller/unpoller:v3.2.0@sha256:bf7bdcc59fcdaa4699687007aa3ec24ddb3c9d9521f392d8c7aa2bea1bdb781a
          name: unpoller
          livenessProbe:
            httpGet:
              path: /
              port: tcp
          readinessProbe:
            httpGet:
              path: /
              port: tcp
          ports:
            - containerPort: 9130
              name: tcp
              protocol: TCP
            # - containerPort: 9130
            #   name: udp
            #   protocol: UDP
          volumeMounts:
            - mountPath: /etc/unpoller/up.conf
              name: config-volume
              subPath: up.conf
          envFrom:
            - secretRef:
                name: unifi-credentials
      volumes:
        - name: config-volume
          configMap:
            name: unpoller-config
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: unifi-poller
spec:
  podMetricsEndpoints:
    - port: tcp
  selector:
    matchLabels:
      app: unpoller
