name: Lint files

on:
  pull_request:
  push:
    branches: [master]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2

  kustomize-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # https://just.systems/man/en/github-actions.html
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Check that all files are referenced in kustomization.yaml
        run: just kref

  detect-apps:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.merged.outputs.all_changed_files }}
      any_changed: ${{ steps.merged.outputs.any_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: depth2
        with:
          files: |
            applications/**
            platform/**
          dir_names: "true"
          dir_names_max_depth: "2"
          matrix: "true"

      - uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: depth3
        with:
          files: |
            infrastructure/operators/**
            infrastructure/system/**
          dir_names: "true"
          dir_names_max_depth: "3"
          matrix: "true"

      - name: Merge changed dirs
        id: merged
        env:
          D2: ${{ steps.depth2.outputs.all_changed_files }}
          D3: ${{ steps.depth3.outputs.all_changed_files }}
        run: |
          MERGED=$(jq \
            --null-input \
            --compact-output \
            --argjson d2 "$D2" \
            --argjson d3 "$D3" \
            '$d2 + $d3 | unique'
          )
          echo "all_changed_files=$MERGED" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$MERGED" | jq 'length')" -gt 0 ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  kubeconform:
    needs: detect-apps
    if: needs.detect-apps.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJson(needs.detect-apps.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # https://just.systems/man/en/github-actions.html
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: "0.6.7"
        run: |
          curl \
            --silent \
            --location \
            --output /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar --extract --file=/tmp/kubeconform.tar.gz --directory=/usr/local/bin kubeconform

      - name: Validate ${{ matrix.directory }}
        run: just kubeconform "${{ matrix.directory }}"

  idempotency:
    needs: detect-apps
    if: needs.detect-apps.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJson(needs.detect-apps.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # https://just.systems/man/en/github-actions.html
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Check idempotency of ${{ matrix.directory }}
        run: just idempotent "${{ matrix.directory }}"
