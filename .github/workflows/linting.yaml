name: Lint files

on:
  pull_request:
  push:
    branches: [master]

env:
  # renovate: datasource=github-releases depName=yannh/kubeconform
  KUBECONFORM_VERSION: "v0.8.0"

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2

  kustomize-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # https://just.systems/man/en/github-actions.html
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Check that all files are referenced in kustomization.yaml
        run: just kref

  detect-apps:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: changed-files
        with:
          files: |
            applications/**
            infrastructure/**
            platform/**
          dir_names: "true"
          dir_names_max_depth: "2"
          matrix: "true"

  kubeconform:
    needs: detect-apps
    if: needs.detect-apps.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJson(needs.detect-apps.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # https://just.systems/man/en/github-actions.html
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install kubeconform
        run: |
          curl \
            --silent \
            --location \
            --output /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar --extract --file=/tmp/kubeconform.tar.gz --directory=/usr/local/bin kubeconform

      - name: Validate ${{ matrix.directory }}
        run: just kubeconform "${{ matrix.directory }}"

  idempotency:
    needs: detect-apps
    if: needs.detect-apps.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJson(needs.detect-apps.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # https://just.systems/man/en/github-actions.html
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Check idempotency of ${{ matrix.directory }}
        run: just idempotent "${{ matrix.directory }}"
