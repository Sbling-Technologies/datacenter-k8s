name: Show applications diff

on:
  pull_request:

jobs:
  detect-apps:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.applications.outputs.all_changed_files }}
      any_changed: ${{ steps.applications.outputs.any_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        id: applications
        with:
          files: applications/**
          dir_names_max_depth: "2"
          dir_names: "true"
          matrix: "true"

  collect-diff:
    needs: detect-apps
    if: needs.detect-apps.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJson(needs.detect-apps.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Calculate diff
        id: diff
        env:
          DIRECTORY: ${{ matrix.directory }}
        run: |
          kustomize build --enable-helm "$DIRECTORY" > /tmp/pr_run.yaml
          git checkout origin/master -- "$DIRECTORY"
          kustomize build --enable-helm "$DIRECTORY" > /tmp/pr_base.yaml

          mkdir -p /tmp/artifact
          echo "$DIRECTORY" > /tmp/artifact/directory.txt
          diff --unified=5 /tmp/pr_base.yaml /tmp/pr_run.yaml > /tmp/artifact/diff.txt || true

          echo "safe_name=$(echo "$DIRECTORY" | tr '/' '__')" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: diff-${{ steps.diff.outputs.safe_name }}
          path: /tmp/artifact
          retention-days: 1

  comment-diff:
    needs: [detect-apps, collect-diff]
    if: always() && needs.detect-apps.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: diff-*
          path: /tmp/diffs

      - name: Build comment body
        id: body
        run: |
          {
            echo "## Application diffs"
            echo

            unchanged=()
            for dir in /tmp/diffs/*/; do
              directory=$(cat "$dir/directory.txt")
              if [ -s "$dir/diff.txt" ]; then
                echo "<details><summary><code>$directory</code> (changed)</summary>"
                echo
                echo '```diff'
                cat "$dir/diff.txt"
                echo '```'
                echo "</details>"
                echo
              else
                unchanged+=("$directory")
              fi
            done

            if [ "${#unchanged[@]}" -gt 0 ]; then
              # shellcheck disable=SC2016
              echo "No diff for: $(printf '`%s` ' "${unchanged[@]}")"
            fi
          } > /tmp/comment_body.md

      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "## Application diffs"

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/comment_body.md
          edit-mode: replace
