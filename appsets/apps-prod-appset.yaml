apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-prod
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: git@github.com:Sbling-Technologies/datacenter-k8s.git
        revision: HEAD
        directories:
          - path: applications/*/envs/prod

  template:
    metadata:
      name: "prod-{{index .path.segments 1}}"
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true
    spec:
      project: production-apps
      destination:
        server: https://kubernetes.default.svc
        namespace: "prod-{{index .path.segments 1}}"
      source:
        repoURL: git@github.com:Sbling-Technologies/datacenter-k8s.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      # https://github.com/argoproj/argo-cd/issues/12569
      ignoreDifferences:
        - jsonPointers:
            - /spec/volumeName
          kind: PersistentVolumeClaim
